<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('JobQuest — Analytics')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<!-- ═══════════════════════════════════════════════════════════════
     ANALYTICS PAGE
     Visualizes application data using Chart.js.
     Charts are populated via REST API calls to /api/applications/analytics/*.
     ═══════════════════════════════════════════════════════════════ -->
<main class="main-content">
    <div class="container">

        <div class="page-header">
            <div>
                <h1><i class="bi bi-bar-chart-line"></i> Analytics</h1>
                <p class="text-muted">Visualize your job search progress</p>
            </div>
        </div>

        <!-- ── Quick Stats Row ───────────────────────────────────── -->
        <div class="row g-4 mb-5">
            <div class="col-md-3">
                <div class="stat-card stat-card-total">
                    <div class="stat-icon"><i class="bi bi-briefcase-fill"></i></div>
                    <div class="stat-info">
                        <span class="stat-number" th:text="${stats.total}">0</span>
                        <span class="stat-label">Total Apps</span>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card stat-card-interview">
                    <div class="stat-icon"><i class="bi bi-camera-video-fill"></i></div>
                    <div class="stat-info">
                        <span class="stat-number" id="conversionRate">0%</span>
                        <span class="stat-label">Interview Rate</span>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card stat-card-offer">
                    <div class="stat-icon"><i class="bi bi-trophy-fill"></i></div>
                    <div class="stat-info">
                        <span class="stat-number" id="offerRate">0%</span>
                        <span class="stat-label">Offer Rate</span>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card stat-card-rejected">
                    <div class="stat-icon"><i class="bi bi-pie-chart-fill"></i></div>
                    <div class="stat-info">
                        <span class="stat-number" id="rejectionRate">0%</span>
                        <span class="stat-label">Rejection Rate</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── Charts ────────────────────────────────────────────── -->
        <div class="row g-4">
            <!-- Monthly Applications Chart -->
            <div class="col-lg-8">
                <div class="glass-card chart-card">
                    <h5 class="card-title">
                        <i class="bi bi-graph-up"></i> Applications Over Time
                    </h5>
                    <canvas id="monthlyChart"></canvas>
                </div>
            </div>

            <!-- Status Distribution Chart -->
            <div class="col-lg-4">
                <div class="glass-card chart-card">
                    <h5 class="card-title">
                        <i class="bi bi-pie-chart"></i> Status Distribution
                    </h5>
                    <canvas id="statusChart"></canvas>
                </div>
            </div>
        </div>

    </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script th:src="@{/js/analytics.js}"></script>
</body>
</html>
