<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
  <!-- ═══════════════════════════════════════════════════════════════
     Reusable layout fragment used by every page.
     Contains the <head>, navigation bar, toast notifications,
     and closing scripts.
     ═══════════════════════════════════════════════════════════════ -->

  <!-- ── HEAD Fragment ──────────────────────────────────────────── -->
  <head th:fragment="head(title)">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="JobQuest — Track your internship and job applications"
    />
    <title th:text="${title}">JobQuest</title>

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <!-- Google Fonts — Inter -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet" />
  </head>

  <body>
    <!-- ── NAVBAR Fragment ────────────────────────────────────────── -->
    <nav
      th:fragment="navbar"
      class="navbar navbar-expand-lg navbar-dark fixed-top"
    >
      <div class="container">
        <a class="navbar-brand" th:href="@{/}">
          <i class="bi bi-rocket-takeoff-fill"></i>
          <span>JobQuest</span>
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" th:href="@{/}">
                <i class="bi bi-speedometer2"></i> Dashboard
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" th:href="@{/applications}">
                <i class="bi bi-list-ul"></i> Applications
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" th:href="@{/kanban}">
                <i class="bi bi-kanban"></i> Kanban
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" th:href="@{/analytics}">
                <i class="bi bi-bar-chart-line"></i> Analytics
              </a>
            </li>
            <li class="nav-item">
              <a
                class="nav-link btn btn-glow ms-2"
                th:href="@{/applications/new}"
              >
                <i class="bi bi-plus-circle"></i> Add New
              </a>
            </li>
            <!-- User dropdown -->
            <li class="nav-item dropdown ms-3">
              <a class="nav-link dropdown-toggle user-dropdown" href="#"
                 role="button" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-person-circle"></i>
                <span th:text="${#authentication.name}" class="ms-1">User</span>
              </a>
              <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
                <li>
                  <form th:action="@{/logout}" method="post" class="px-0 m-0">
                    <button type="submit" class="dropdown-item text-danger">
                      <i class="bi bi-box-arrow-right me-2"></i>Logout
                    </button>
                  </form>
                </li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- ── TOAST Fragment (success / error messages) ──────────────── -->
    <div
      th:fragment="toast"
      class="toast-container position-fixed top-0 end-0 p-3"
      style="z-index: 9999"
    >
      <div
        th:if="${successMessage}"
        class="toast show align-items-center text-bg-success border-0"
        role="alert"
      >
        <div class="d-flex">
          <div class="toast-body">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${successMessage}"></span>
          </div>
          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
          ></button>
        </div>
      </div>
    </div>

    <!-- ── SCRIPTS Fragment ───────────────────────────────────────── -->
    <div th:fragment="scripts">
      <!-- Bootstrap 5 JS Bundle -->
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
      <!-- Custom JS -->
      <script th:src="@{/js/app.js}"></script>
    </div>
  </body>
</html>
