<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="JobQuest — Create your account to start tracking applications" />
    <title>JobQuest — Register</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <!-- Google Fonts — Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet" />

    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 440px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
            animation: slideUp 0.6s ease both;
        }

        .auth-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(135deg, #10b981, #34d399);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo i {
            font-size: 3rem;
            color: #10b981;
            margin-bottom: 0.5rem;
            display: block;
        }

        .auth-logo h1 {
            font-weight: 800;
            font-size: 2rem;
            background: linear-gradient(135deg, #10b981, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
        }

        .auth-logo p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .auth-card .form-control {
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
        }

        .auth-card .input-group-text {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #94a3b8;
            border-right: none;
        }

        .auth-card .input-group .form-control {
            border-left: none;
        }

        .auth-card .input-group:focus-within .input-group-text {
            border-color: #10b981;
            color: #10b981;
        }

        .btn-auth {
            background: linear-gradient(135deg, #10b981, #34d399);
            color: white;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            padding: 0.8rem;
            border-radius: 12px;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(16, 185, 129, 0.5);
            color: white;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: #34d399;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .auth-footer a:hover {
            color: #6ee7b7;
        }

        .auth-alert {
            border-radius: 12px;
            font-size: 0.88rem;
            padding: 0.75rem 1rem;
            margin-bottom: 1.5rem;
            border: none;
        }

        .auth-alert-error {
            background: rgba(239, 68, 68, 0.12);
            color: #f87171;
        }

        .auth-alert-success {
            background: rgba(16, 185, 129, 0.12);
            color: #34d399;
        }

        .password-toggle {
            cursor: pointer;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #94a3b8;
            border-left: none;
            transition: color 0.2s ease;
        }

        .password-toggle:hover {
            color: #f1f5f9;
        }

        .password-requirements {
            font-size: 0.78rem;
            color: #64748b;
            margin-top: 0.4rem;
        }
    </style>
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <!-- Logo -->
        <div class="auth-logo">
            <i class="bi bi-person-plus-fill"></i>
            <h1>Join JobQuest</h1>
            <p>Create your account and start tracking.</p>
        </div>

        <!-- Error Message -->
        <div th:if="${errorMessage}" class="auth-alert auth-alert-error">
            <i class="bi bi-exclamation-circle-fill me-2"></i>
            <span th:text="${errorMessage}">Error</span>
        </div>

        <!-- Registration Form -->
        <form th:action="@{/register}" method="post">
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-person-badge"></i> Display Name</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-badge-fill"></i></span>
                    <input type="text" class="form-control" name="displayName" id="displayName"
                           placeholder="Your full name"
                           th:value="${displayName}" required autofocus />
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label"><i class="bi bi-person"></i> Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-at"></i></span>
                    <input type="text" class="form-control" name="username" id="username"
                           placeholder="Choose a username (min 3 chars)"
                           th:value="${username}" required minlength="3" />
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label"><i class="bi bi-lock"></i> Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" class="form-control" name="password" id="password"
                           placeholder="Create a password" required minlength="6" />
                    <span class="input-group-text password-toggle" onclick="togglePassword('password', this)">
                        <i class="bi bi-eye"></i>
                    </span>
                </div>
                <div class="password-requirements">
                    <i class="bi bi-info-circle"></i> Must be at least 6 characters
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label"><i class="bi bi-shield-lock"></i> Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-shield-lock-fill"></i></span>
                    <input type="password" class="form-control" name="confirmPassword" id="confirmPassword"
                           placeholder="Re-enter your password" required minlength="6" />
                    <span class="input-group-text password-toggle" onclick="togglePassword('confirmPassword', this)">
                        <i class="bi bi-eye"></i>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn btn-auth" id="registerBtn">
                <i class="bi bi-person-check me-2"></i>Create Account
            </button>
        </form>

        <div class="auth-footer">
            Already have an account? <a th:href="@{/login}">Sign in</a>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function togglePassword(inputId, toggleElement) {
        const input = document.getElementById(inputId);
        const icon = toggleElement.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }
</script>
</body>
</html>
