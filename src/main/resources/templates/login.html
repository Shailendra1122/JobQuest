<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="JobQuest — Log in to track your internship and job applications" />
    <title>JobQuest — Login</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <!-- Google Fonts — Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet" />

    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 440px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
            animation: slideUp 0.6s ease both;
        }

        .auth-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo i {
            font-size: 3rem;
            color: #6366f1;
            margin-bottom: 0.5rem;
            display: block;
        }

        .auth-logo h1 {
            font-weight: 800;
            font-size: 2rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
        }

        .auth-logo p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .auth-card .form-control {
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
        }

        .auth-card .input-group-text {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #94a3b8;
            border-right: none;
        }

        .auth-card .input-group .form-control {
            border-left: none;
        }

        .auth-card .input-group:focus-within .input-group-text {
            border-color: #6366f1;
            color: #6366f1;
        }

        .btn-auth {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            padding: 0.8rem;
            border-radius: 12px;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.5);
            color: white;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: #8b5cf6;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .auth-footer a:hover {
            color: #a78bfa;
        }

        .auth-alert {
            border-radius: 12px;
            font-size: 0.88rem;
            padding: 0.75rem 1rem;
            margin-bottom: 1.5rem;
            border: none;
        }

        .auth-alert-error {
            background: rgba(239, 68, 68, 0.12);
            color: #f87171;
        }

        .auth-alert-success {
            background: rgba(16, 185, 129, 0.12);
            color: #34d399;
        }

        .password-toggle {
            cursor: pointer;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #94a3b8;
            border-left: none;
            transition: color 0.2s ease;
        }

        .password-toggle:hover {
            color: #f1f5f9;
        }
    </style>
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <!-- Logo -->
        <div class="auth-logo">
            <i class="bi bi-rocket-takeoff-fill"></i>
            <h1>JobQuest</h1>
            <p>Welcome back! Log in to your account.</p>
        </div>

        <!-- Error / Success Messages -->
        <div th:if="${errorMessage}" class="auth-alert auth-alert-error">
            <i class="bi bi-exclamation-circle-fill me-2"></i>
            <span th:text="${errorMessage}">Error</span>
        </div>
        <div th:if="${successMessage}" class="auth-alert auth-alert-success">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${successMessage}">Success</span>
        </div>

        <!-- Login Form -->
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-person"></i> Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                    <input type="text" class="form-control" name="username" id="username"
                           placeholder="Enter your username" required autofocus />
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label"><i class="bi bi-lock"></i> Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" class="form-control" name="password" id="password"
                           placeholder="Enter your password" required />
                    <span class="input-group-text password-toggle" onclick="togglePassword('password', this)">
                        <i class="bi bi-eye"></i>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn btn-auth" id="loginBtn">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a th:href="@{/register}">Create one</a>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function togglePassword(inputId, toggleElement) {
        const input = document.getElementById(inputId);
        const icon = toggleElement.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }
</script>
</body>
</html>
